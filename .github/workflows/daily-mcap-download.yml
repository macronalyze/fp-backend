name: Daily Mcap Download

on:
  schedule:
    # 8:30 PM IST = 15:00 UTC, weekdays only (Mon-Fri).
    # Runs after the bhav download to give NSE time to publish the PR archive.
    - cron: "0 15 * * 1-5"
  workflow_dispatch:

jobs:
  trigger-download:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger mcap download
        run: |
          curl -sf -X POST "${{ vars.RENDER_APP_URL }}/fp/api/v1/mcap/download" \
            -H "Content-Type: application/json" \
            --max-time 60
